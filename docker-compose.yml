services:
  # ── Banco de Dados ───────────────────────────────────────── #
  postgres_casamento:
    image: postgres:15-alpine
    container_name: postgres_casamento
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_casamento_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_casamento_data: